name: squishy

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tests (score golden-vector, fail-on-missing, PRNG reference vectors)
        run: uv run pytest -m "not slow" -q
      - name: Squishy Score runner self-check (exits non-zero on incomplete core)
        # The 15-file core isn't checked into the repo (it's published separately),
        # so the runner must report CORE INCOMPLETE and exit non-zero here. This
        # guards the fail-on-missing contract that makes a reported score trustworthy.
        run: |
          if uv run squishy board; then
            echo "ERROR: runner returned 0 with no core present"; exit 1
          else
            echo "OK: runner correctly refused to score without the core"
          fi
