<text x="241.5" y="544" font-size="11" fill="#6b7682" text-anchor="middle">2</text>
<line x1="326.2" y1="78" x2="326.2" y2="526" stroke="#e3e7ec"/>
<text x="326.2" y="544" font-size="11" fill="#6b7682" text-anchor="middle">3</text>
<line x1="411.0" y1="78" x2="411.0" y2="526" stroke="#e3e7ec"/>
