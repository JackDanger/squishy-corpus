<text x="495.8" y="544" font-size="11" fill="#6b7682" text-anchor="middle">5</text>
<line x1="580.5" y1="78" x2="580.5" y2="526" stroke="#e3e7ec"/>
<text x="580.5" y="544" font-size="11" fill="#6b7682" text-anchor="middle">6</text>
<line x1="665.2" y1="78" x2="665.2" y2="526" stroke="#e3e7ec"/>
<text x="665.2" y="544" font-size="11" fill="#6b7682" text-anchor="middle">7</text>
<line x1="750.0" y1="78" x2="750.0" y2="526" stroke="#e3e7ec"/>
<text x="750.0" y="544" font-size="11" fill="#6b7682" text-anchor="middle">8</text>
<line x1="72" y1="526.0" x2="750" y2="526.0" stroke="#e3e7ec"/>
