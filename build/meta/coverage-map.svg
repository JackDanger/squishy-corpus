<text x="62" y="350.8" font-size="11" fill="#6b7682" text-anchor="end">0.4</text>
<line x1="72" y1="257.2" x2="750" y2="257.2" stroke="#e3e7ec"/>
<text x="62" y="261.2" font-size="11" fill="#6b7682" text-anchor="end">0.6</text>
<line x1="72" y1="167.6" x2="750" y2="167.6" stroke="#e3e7ec"/>
<text x="62" y="171.6" font-size="11" fill="#6b7682" text-anchor="end">0.8</text>
